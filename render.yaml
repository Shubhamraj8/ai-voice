# Render Blueprint — ticket 1.17
# https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo → region Singapore.
# Warm ping: configure cron-job.org per docs/deploy-render.md

services:
  - type: web
    name: ai-voice-api
    runtime: python
    region: singapore
    plan: free
    rootDir: apps/api
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      # Twilio webhooks (tickets 2.01–2.02)
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: TWILIO_SIGNATURE_VALIDATION
        value: "true"
      # Deepgram — Aura-1 TTS + Nova-3 STT (ticket 2.07)
      - key: DEEPGRAM_API_KEY
        sync: false
