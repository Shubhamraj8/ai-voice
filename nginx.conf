# Nginx configuration for ai-voice application
# Place this in /etc/nginx/sites-available/ai-voice
# and symlink to /etc/nginx/sites-enabled/ai-voice

server {
    # Listen on port 80 (HTTP)
    listen 80;
    
    # Replace with your actual domain or EC2 Public IP
    server_name your_domain_or_EC2_IP;

    # --- FastAPI Backend ---
    # Proxies requests for specific API endpoints to the FastAPI backend running on port 8000
    # Because FastAPI routes don't have an /api prefix natively (e.g. they are /health, /me),
    # we can route specific paths to port 8000. Alternatively, consider using a separate subdomain 
    # like api.yourdomain.com.
    # 
    # Here, we rewrite /api/... to /... before sending it to FastAPI
    location /api/ {
        # The trailing slash on the proxy_pass URL strips the "/api" part of the URI
        proxy_pass http://localhost:8000/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Next.js Frontend ---
    # Proxies all other standard requests to the Next.js web application running on port 3000
    location / {
        proxy_pass http://localhost:3000;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }
}
